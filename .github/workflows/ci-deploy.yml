name: API CI & Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm ci

      - name: Gerar cliente Prisma
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Testes unitários
        run: npm test

      - name: Verificar cobertura
        run: npm run test:cov

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: ci
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: pedi-ai-api

      - name: Deploy API na VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            mkdir -p ~/.ssh
            ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null || true

            # Instalar Node.js 20 se não existir
            if ! command -v node &> /dev/null || [[ $(node -v) != v20* ]]; then
              # Aguardar lock do apt liberar
              while fuser /var/lib/apt/lists/lock >/dev/null 2>&1; do sleep 1; done
              apt-get update -y
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y nodejs
              npm install -g npm@latest
            fi

            # Se pasta não existe, clonar. Se existe, fazer pull.
            if [ ! -d /root/pedi-ai-api ]; then
              git clone https://github.com/b3ll3o/pedi-ai-api.git /root/pedi-ai-api
            fi

            cd /root/pedi-ai-api

            # Pull latest changes
            git pull origin main

            # Build
            npm ci
            npx prisma generate
            npm run build

            # Copiar e instalar serviço systemd
            cp deploy/pedi-ai-api.service /etc/systemd/system/

            # Parar e desabilitar container Docker (se existir)
            docker ps -a --filter "name=pedi_ai_api" --format "{{.Names}}" | xargs -r docker stop 2>/dev/null || true
            docker compose -f /root/pedi-ai-api/docker-compose.yml down 2>/dev/null || true
            systemctl disable pedi-ai-api 2>/dev/null || true

            # Garantir que porta 3001 está livre
            fuser -k 3001/tcp 2>/dev/null || true
            lsof -ti:3001 | xargs -r kill -9 2>/dev/null || true
            sleep 3

            # Criar .env se não existir (temporário)
            if [ ! -f /root/pedi-ai-api/.env ]; then
              echo "ATENÇÃO: .env não encontrado, criando temporário..."
              echo "DATABASE_URL=postgresql://postgres:postgres123@localhost:5432/dev?schema=public" > /root/pedi-ai-api/.env
              echo "JWT_SECRET=temp-secret-please-replace" >> /root/pedi-ai-api/.env
              echo "JWT_REFRESH_SECRET=temp-refresh-secret-please-replace" >> /root/pedi-ai-api/.env
              echo "JWT_EXPIRES_IN=15m" >> /root/pedi-ai-api/.env
              echo "JWT_REFRESH_EXPIRES_IN=7d" >> /root/pedi-ai-api/.env
              echo "PORT=3001" >> /root/pedi-ai-api/.env
              echo "HOST=0.0.0.0" >> /root/pedi-ai-api/.env
              echo "NODE_ENV=production" >> /root/pedi-ai-api/.env
              echo "ALLOWED_ORIGINS=http://andreazzi.tech" >> /root/pedi-ai-api/.env
            fi

            # Verificar se .env tem DATABASE_URL
            if ! grep -q "DATABASE_URL" /root/pedi-ai-api/.env 2>/dev/null; then
              echo "DATABASE_URL=postgresql://postgres:postgres123@localhost:5432/dev?schema=public" >> /root/pedi-ai-api/.env
            fi

            # Recarregar e iniciar serviço systemd
            systemctl daemon-reload
            systemctl enable pedi-ai-api
            systemctl restart pedi-ai-api

            # Ver logs se falhar
            sleep 3
            if ! systemctl is-active --quiet pedi-ai-api; then
              echo "=== Logs do systemd ==="
              journalctl -u pedi-ai-api --no-pager -n 50 || true
              systemctl status pedi-ai-api --no-pager || true
            fi

            # Aguardar API ficar ready
            echo "Aguardando API..."
            for i in {1..30}; do
              if curl -sf http://localhost:3001/health > /dev/null 2>&1; then
                echo "API pronta!"
                break
              fi
              echo "Aguardando API... ($i/30)"
              sleep 2
            done

            # Verificar status
            systemctl status pedi-ai-api --no-pager