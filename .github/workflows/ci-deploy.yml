name: API CI & Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm ci

      - name: Gerar cliente Prisma
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Testes unitários
        run: npm test

      - name: Verificar cobertura
        run: npm run test:cov

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: ci
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: pedi-ai-api

      - name: Deploy API na VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            mkdir -p ~/.ssh
            ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null || true

            # Instalar Node.js 20 se não existir
            if ! command -v node &> /dev/null || [[ $(node -v) != v20* ]]; then
              # Aguardar lock do apt liberar
              while fuser /var/lib/apt/lists/lock >/dev/null 2>&1; do sleep 1; done
              apt-get update -y
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y nodejs
              npm install -g npm@latest
            fi

            # Se pasta não existe, clonar. Se existe, fazer pull.
            if [ ! -d /root/pedi-ai-api ]; then
              git clone https://github.com/b3ll3o/pedi-ai-api.git /root/pedi-ai-api
            fi

            cd /root/pedi-ai-api

            # Pull latest changes
            git pull origin main

            # Build
            npm ci
            npx prisma generate
            npm run build

            # Copiar e instalar serviço systemd
            cp deploy/pedi-ai-api.service /etc/systemd/system/

            # Parar e desabilitar container Docker (se existir)
            cd /root/pedi-ai-api
            docker compose down 2>/dev/null || true
            systemctl disable pedi-ai-api 2>/dev/null || true
            fuser -k 3001/tcp 2>/dev/null || true
            sleep 2

            # Recarregar e iniciar serviço systemd
            systemctl daemon-reload
            systemctl enable pedi-ai-api
            systemctl restart pedi-ai-api

            # Aguardar API ficar ready
            echo "Aguardando API..."
            for i in {1..30}; do
              if curl -sf http://localhost:3001/health > /dev/null 2>&1; then
                echo "API pronta!"
                break
              fi
              echo "Aguardando API... ($i/30)"
              sleep 2
            done

            # Verificar status
            systemctl status pedi-ai-api --no-pager